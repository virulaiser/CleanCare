; CleanCare — Raspberry Pi Pico W BLE firmware
; Compatible 1:1 con el protocolo BLE del ESP32 (mismos UUIDs y comandos).
;
; Subir:
;   cd firmware/pico_w_ble
;   pio run --target upload
;   pio device monitor

[env:pico_w]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipicow
framework = arduino
board_build.core = earlephilhower
board_build.filesystem_size = 0.5m
monitor_speed = 115200
upload_speed = 115200
lib_deps =
    arduino-libraries/ArduinoBLE @ ^1.4.0

build_flags =
    -DPICO_STDIO_USB=1
    -DPICO_CYW43_SUPPORTED=1
