name: iOS build (unsigned IPA)

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: "Build configuration"
        required: true
        default: "Release"
        type: choice
        options:
          - Debug
          - Release
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/ios-build.yml"

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build unsigned IPA for iOS
    runs-on: macos-15
    timeout-minutes: 60

    defaults:
      run:
        working-directory: app

    env:
      EXPO_PUBLIC_API_URL: https://backend-one-tau-21.vercel.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Ruby (CocoaPods)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prebuild (expo -> ios/)
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Install CocoaPods
        working-directory: app/ios
        run: |
          gem install cocoapods
          pod install --repo-update

      - name: Patch SplashScreen.storyboard
        working-directory: app/ios/CleanCare
        run: |
          echo "--- Before patch ---"
          head -5 SplashScreen.storyboard
          # Remove systemVersion attribute so ibtool does not require iOS 18.2 platform
          sed -i '' 's/ systemVersion="[0-9.]*"//g' SplashScreen.storyboard
          echo "--- After patch ---"
          head -5 SplashScreen.storyboard

      - name: Archive (unsigned)
        working-directory: app/ios
        run: |
          xcodebuild \
            -workspace CleanCare.xcworkspace \
            -scheme CleanCare \
            -configuration ${{ github.event.inputs.configuration || 'Release' }} \
            -destination 'generic/platform=iOS' \
            -archivePath $PWD/build/CleanCare.xcarchive \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            SDKROOT=iphoneos \
            IPHONEOS_DEPLOYMENT_TARGET=16.0 \
            clean archive

      - name: Package unsigned IPA
        working-directory: app/ios/build/CleanCare.xcarchive/Products/Applications
        run: |
          mkdir -p Payload
          cp -R CleanCare.app Payload/
          zip -qr "$GITHUB_WORKSPACE/CleanCare-unsigned.ipa" Payload
          ls -lh "$GITHUB_WORKSPACE/CleanCare-unsigned.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: CleanCare-unsigned-ipa
          path: CleanCare-unsigned.ipa
          retention-days: 14
          if-no-files-found: error
