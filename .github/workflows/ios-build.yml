name: iOS build (unsigned IPA)

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: "Build configuration"
        required: true
        default: "Release"
        type: choice
        options:
          - Debug
          - Release
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/ios-build.yml"

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build unsigned IPA for iOS
    runs-on: macos-15
    timeout-minutes: 45

    defaults:
      run:
        working-directory: app

    env:
      EXPO_PUBLIC_API_URL: https://backend-one-tau-21.vercel.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.1
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.1"

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Ensure iOS platform runtime installed
        run: |
          xcodebuild -runFirstLaunch || true
          sudo xcodebuild -downloadPlatform iOS 2>&1 | tail -20 || true
          echo "---"
          xcrun simctl list runtimes 2>&1 | head -10 || true

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Ruby (CocoaPods)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prebuild (expo -> ios/)
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Fix storyboard targetRuntime and deployment target
        # 1) expo prebuild puede generar targetRuntime="AppleCocoa" (macOS) o
        #    "AppleSimulator". Lo cambiamos a "AppleMobile" (iOS device).
        # 2) Bajamos IPHONEOS_DEPLOYMENT_TARGET de 18.1 a 15.1 en el .xcodeproj
        #    para que xcodebuild no exija la platform iOS 18.x instalada.
        run: |
          sed -i '' 's/targetRuntime="AppleCocoa"/targetRuntime="AppleMobile"/g' ios/CleanCare/SplashScreen.storyboard || true
          sed -i '' 's/targetRuntime="AppleSimulator"/targetRuntime="AppleMobile"/g' ios/CleanCare/SplashScreen.storyboard || true
          grep -o 'targetRuntime="[^"]*"' ios/CleanCare/SplashScreen.storyboard || echo "no targetRuntime"
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 18.1/IPHONEOS_DEPLOYMENT_TARGET = 15.1/g' ios/CleanCare.xcodeproj/project.pbxproj
          grep "IPHONEOS_DEPLOYMENT_TARGET" ios/CleanCare.xcodeproj/project.pbxproj | head -3

      - name: Install CocoaPods
        working-directory: app/ios
        run: |
          gem install cocoapods
          pod install --repo-update

      - name: Archive (unsigned)
        # Sin -destination, xcodebuild usa el SDK (-sdk iphoneos) directamente
        # sin necesitar la platform iOS runtime instalada en el sistema.
        working-directory: app/ios
        run: |
          xcodebuild \
            -workspace CleanCare.xcworkspace \
            -scheme CleanCare \
            -configuration ${{ github.event.inputs.configuration || 'Release' }} \
            -sdk iphoneos \
            -archivePath $PWD/build/CleanCare.xcarchive \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean archive

      - name: Package unsigned IPA
        working-directory: app/ios/build/CleanCare.xcarchive/Products/Applications
        run: |
          mkdir -p Payload
          cp -R CleanCare.app Payload/
          zip -qr "$GITHUB_WORKSPACE/CleanCare-unsigned.ipa" Payload
          ls -lh "$GITHUB_WORKSPACE/CleanCare-unsigned.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: CleanCare-unsigned-ipa
          path: CleanCare-unsigned.ipa
          retention-days: 14
          if-no-files-found: error
