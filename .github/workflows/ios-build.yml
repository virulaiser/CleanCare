name: iOS build (unsigned IPA)

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: "Build configuration"
        required: true
        default: "Release"
        type: choice
        options:
          - Debug
          - Release
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/ios-build.yml"

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build unsigned IPA for iOS
    runs-on: macos-15
    timeout-minutes: 45

    defaults:
      run:
        working-directory: app

    env:
      # La app usa este env en runtime para saber a qué backend pegarle
      EXPO_PUBLIC_API_URL: https://backend-one-tau-21.vercel.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.1 (plataforma iOS 18.1 ya pre-instalada en macos-15)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.1"

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Ruby (CocoaPods)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prebuild (expo → ios/)
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Patch SplashScreen.storyboard (sin dependencia de platform iOS)
        # toolsVersion 19529 = Xcode 14, no exige iOS 18.x al ibtool.
        # Versiones mas nuevas (21701 = Xcode 16) piden platform instalada.
        run: |
          STORYBOARD='<?xml version="1.0" encoding="UTF-8"?><document type="com.apple.InterfaceBuilder3.CocoaTouch.Storyboard.XIB" version="3.0" toolsVersion="19529" targetRuntime="AppleCocoa" propertyAccessControl="none" useAutolayout="YES" launchScreen="YES" useTraitCollections="YES" useSafeAreas="YES" colorMatched="YES"><scenes><scene sceneID="EHf-IW-A2E"><objects><viewController id="01J-lp-oVM" sceneMemberID="viewController"><view key="view" contentMode="scaleToFill" id="Ze5-6b-2t3"><rect key="frame" x="0.0" y="0.0" width="390" height="844"/><autoresizingMask key="autoresizingMask" widthSizable="YES" heightSizable="YES"/><color key="backgroundColor" red="1" green="1" blue="1" alpha="1" colorSpace="custom" customColorSpace="sRGB"/></view></viewController><placeholder placeholderIdentifier="IBFirstResponder" id="iYj-Kq-Ea1" userLabel="First Responder" sceneMemberID="firstResponder"/></objects><point key="canvasLocation" x="53" y="375"/></scene></scenes></document>'
          echo "$STORYBOARD" > ios/CleanCare/SplashScreen.storyboard

      - name: Install CocoaPods
        working-directory: app/ios
        run: |
          gem install cocoapods
          pod install --repo-update

      - name: Archive (unsigned)
        # -destination generic/platform=iOS + ONLY_ACTIVE_ARCH=NO permite
        # archivar sin que xcodebuild exija la platform iOS runtime instalada
        # (solo el SDK basta con estos flags).
        working-directory: app/ios
        run: |
          xcodebuild \
            -workspace CleanCare.xcworkspace \
            -scheme CleanCare \
            -configuration ${{ github.event.inputs.configuration || 'Release' }} \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath $PWD/build/CleanCare.xcarchive \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean archive

      - name: Package unsigned IPA
        working-directory: app/ios/build/CleanCare.xcarchive/Products/Applications
        run: |
          mkdir -p Payload
          cp -R CleanCare.app Payload/
          zip -qr "$GITHUB_WORKSPACE/CleanCare-unsigned.ipa" Payload
          ls -lh "$GITHUB_WORKSPACE/CleanCare-unsigned.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: CleanCare-unsigned-ipa
          path: CleanCare-unsigned.ipa
          retention-days: 14
          if-no-files-found: error
